apiVersion: 1

datasources:
  - name: SentinelMCP
    type: postgres
    url: postgres:5432
    database: sentinelmcp
    user: sentinel
    secureJsonData:
      password: sentinel
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
