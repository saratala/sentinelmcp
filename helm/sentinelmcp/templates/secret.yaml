apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinelmcp.fullname" . }}-secrets
  labels:
    {{- include "sentinelmcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  SENTINEL_API_KEY: {{ .Values.api.env.SENTINEL_API_KEY | quote }}
  SENTINEL_REDIS_URL: {{ include "sentinelmcp.redisUrl" . | quote }}
  SENTINEL_POSTGRES_URL: {{ include "sentinelmcp.postgresUrl" . | quote }}
  SENTINEL_CELERY_BROKER_URL: {{ printf "%s/1" (include "sentinelmcp.redisUrl" . | replace "/0" "") | quote }}
  SENTINEL_CELERY_RESULT_BACKEND: {{ printf "%s/1" (include "sentinelmcp.redisUrl" . | replace "/0" "") | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
  {{- end }}
