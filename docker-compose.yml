x-app-env: &app-env
  SENTINEL_REDIS_URL: redis://redis:6379/0
  SENTINEL_REDIS_PASSWORD: ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
  SENTINEL_CELERY_BROKER_URL: redis://:${SENTINEL_REDIS_PASSWORD:-sentinelredis}@redis:6379/1
  SENTINEL_CELERY_RESULT_BACKEND: redis://:${SENTINEL_REDIS_PASSWORD:-sentinelredis}@redis:6379/1
  SENTINEL_POSTGRES_URL: postgresql+asyncpg://sentinel:${SENTINEL_POSTGRES_PASSWORD:-sentinel}@postgres/sentinelmcp
  SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}
  SENTINEL_OTEL_ENDPOINT: ${SENTINEL_OTEL_ENDPOINT:-}
  SENTINEL_JWT_SECRET: ${SENTINEL_JWT_SECRET:-}
  SENTINEL_JWT_ISSUER: ${SENTINEL_JWT_ISSUER:-}
  SENTINEL_JWT_AUDIENCE: ${SENTINEL_JWT_AUDIENCE:-}
  SENTINEL_JWKS_URL: ${SENTINEL_JWKS_URL:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SENTINEL_LLM_ANALYSIS_ENABLED: ${SENTINEL_LLM_ANALYSIS_ENABLED:-true}
  SENTINEL_LLM_PROVIDER: ${SENTINEL_LLM_PROVIDER:-auto}
  SENTINEL_OLLAMA_URL: ${SENTINEL_OLLAMA_URL:-http://host.docker.internal:11434}
  SENTINEL_OLLAMA_MODEL: ${SENTINEL_OLLAMA_MODEL:-qwen2.5:7b}
  # HA mode — empty by default; overridden when running with --profile ha
  SENTINEL_REDIS_SENTINEL_URLS: "${SENTINEL_REDIS_SENTINEL_URLS:-}"
  SENTINEL_POSTGRES_REPLICA_URL: "${SENTINEL_POSTGRES_REPLICA_URL:-}"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
      --bind 0.0.0.0
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SENTINEL_REDIS_PASSWORD:-sentinelredis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: sentinelmcp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelmcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      target: api
    ports:
      - "8888:8888"
    environment:
      <<: *app-env
      SENTINEL_GATEWAY_URL: http://localhost:8888
      CLEAN_SERVER_URL: http://demo-clean:8001
      POISONED_SERVER_URL: http://demo-poisoned:8002
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: .
      target: worker
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  # ── Grafana threat dashboard ────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sentinelmcp.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── React dashboard ─────────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      target: dashboard-serve
      args:
        VITE_SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: on-failure

  # ── SentinelMCP as an MCP Server (for agentic AI integration) ──────────────

  sentinel-mcp-server:
    build:
      context: .
      target: api
    ports:
      - "8889:8889"
    environment:
      <<: *app-env
      SENTINEL_MCP_PORT: "8889"
      CLEAN_SERVER_URL: http://demo-clean:8001
      POISONED_SERVER_URL: http://demo-poisoned:8002
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    command: ["python", "demo/sentinel_mcp_server.py"]
    depends_on:
      - api
    profiles: ["demo"]
    restart: on-failure

  # ── Demo servers (for CISO demo only) ──────────────────────────────────────

  demo-clean:
    build:
      context: .
      target: demo-clean
    ports:
      - "8001:8001"
    profiles: ["demo"]

  demo-poisoned:
    build:
      context: .
      target: demo-poisoned
    ports:
      - "8002:8002"
    profiles: ["demo"]

  # ── Observability (Jaeger) ──────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: ["observability"]

  # ── High-Availability: Redis Sentinel + Postgres read replica ──────────────
  # Start with: docker compose --profile ha up -d   (or: make ha)

  redis-master:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
      --bind 0.0.0.0
    profiles: ["ha"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SENTINEL_REDIS_PASSWORD:-sentinelredis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-replica:
    image: redis:7-alpine
    command: >
      redis-server
      --replicaof redis-master 6379
      --requirepass ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
      --masterauth ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
      --bind 0.0.0.0
    depends_on:
      redis-master:
        condition: service_healthy
    profiles: ["ha"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SENTINEL_REDIS_PASSWORD:-sentinelredis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /etc/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${SENTINEL_REDIS_PASSWORD:-sentinelredis}' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    ports:
      - "127.0.0.1:26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    profiles: ["ha"]

  redis-sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /etc/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${SENTINEL_REDIS_PASSWORD:-sentinelredis}' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    ports:
      - "127.0.0.1:26380:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    profiles: ["ha"]

  redis-sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /etc/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${SENTINEL_REDIS_PASSWORD:-sentinelredis}' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    ports:
      - "127.0.0.1:26381:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    profiles: ["ha"]

  postgres-replica:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: postgres
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${SENTINEL_POSTGRES_REPLICATION_PASSWORD:-replicapass}
      POSTGRESQL_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:-sentinel}
      POSTGRESQL_USERNAME: sentinel
      POSTGRESQL_DATABASE: sentinelmcp
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["ha"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelmcp"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  grafana_data:
