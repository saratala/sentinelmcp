x-app-env: &app-env
  SENTINEL_REDIS_URL: redis://redis:6379/0
  SENTINEL_CELERY_BROKER_URL: redis://redis:6379/1
  SENTINEL_CELERY_RESULT_BACKEND: redis://redis:6379/1
  SENTINEL_POSTGRES_URL: postgresql+asyncpg://sentinel:sentinel@postgres/sentinelmcp
  SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinelmcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      target: api
    ports:
      - "8888:8888"
    environment:
      <<: *app-env
      SENTINEL_GATEWAY_URL: http://localhost:8888
      CLEAN_SERVER_URL: http://demo-clean:8001
      POISONED_SERVER_URL: http://demo-poisoned:8002
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: .
      target: worker
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  # ── Grafana threat dashboard ────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sentinelmcp.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── React dashboard ─────────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      target: dashboard-serve
      args:
        VITE_SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: on-failure

  # ── Demo servers (for CISO demo only) ──────────────────────────────────────

  demo-clean:
    build:
      context: .
      target: demo-clean
    ports:
      - "8001:8001"
    profiles: ["demo"]

  demo-poisoned:
    build:
      context: .
      target: demo-poisoned
    ports:
      - "8002:8002"
    profiles: ["demo"]

volumes:
  postgres_data:
  grafana_data:
