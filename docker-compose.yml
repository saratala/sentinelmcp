x-app-env: &app-env
  SENTINEL_REDIS_URL: redis://redis:6379/0
  SENTINEL_REDIS_PASSWORD: ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
  SENTINEL_CELERY_BROKER_URL: redis://:${SENTINEL_REDIS_PASSWORD:-sentinelredis}@redis:6379/1
  SENTINEL_CELERY_RESULT_BACKEND: redis://:${SENTINEL_REDIS_PASSWORD:-sentinelredis}@redis:6379/1
  SENTINEL_POSTGRES_URL: postgresql+asyncpg://sentinel:${SENTINEL_POSTGRES_PASSWORD:-sentinel}@postgres/sentinelmcp
  SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}
  SENTINEL_OTEL_ENDPOINT: ${SENTINEL_OTEL_ENDPOINT:-}
  SENTINEL_JWT_SECRET: ${SENTINEL_JWT_SECRET:-}
  SENTINEL_JWT_ISSUER: ${SENTINEL_JWT_ISSUER:-}
  SENTINEL_JWT_AUDIENCE: ${SENTINEL_JWT_AUDIENCE:-}
  SENTINEL_JWKS_URL: ${SENTINEL_JWKS_URL:-}

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${SENTINEL_REDIS_PASSWORD:-sentinelredis}
      --bind 0.0.0.0
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SENTINEL_REDIS_PASSWORD:-sentinelredis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${SENTINEL_POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: sentinelmcp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelmcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      target: api
    ports:
      - "8888:8888"
    environment:
      <<: *app-env
      SENTINEL_GATEWAY_URL: http://localhost:8888
      CLEAN_SERVER_URL: http://demo-clean:8001
      POISONED_SERVER_URL: http://demo-poisoned:8002
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: .
      target: worker
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  # ── Grafana threat dashboard ────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sentinelmcp.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── React dashboard ─────────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      target: dashboard-serve
      args:
        VITE_SENTINEL_API_KEY: ${SENTINEL_API_KEY:-dev-key-123}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: on-failure

  # ── SentinelMCP as an MCP Server (for agentic AI integration) ──────────────

  sentinel-mcp-server:
    build:
      context: .
      target: api
    ports:
      - "8889:8889"
    environment:
      <<: *app-env
      SENTINEL_MCP_PORT: "8889"
      CLEAN_SERVER_URL: http://demo-clean:8001
      POISONED_SERVER_URL: http://demo-poisoned:8002
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    command: ["python", "demo/sentinel_mcp_server.py"]
    depends_on:
      - api
    profiles: ["demo"]
    restart: on-failure

  # ── Demo servers (for CISO demo only) ──────────────────────────────────────

  demo-clean:
    build:
      context: .
      target: demo-clean
    ports:
      - "8001:8001"
    profiles: ["demo"]

  demo-poisoned:
    build:
      context: .
      target: demo-poisoned
    ports:
      - "8002:8002"
    profiles: ["demo"]

  # ── Observability (Jaeger) ──────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: ["observability"]

volumes:
  postgres_data:
  grafana_data:
