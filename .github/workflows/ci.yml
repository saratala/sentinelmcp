name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinelmcp
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U sentinel -d sentinelmcp" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        env:
          SENTINEL_REDIS_URL: redis://localhost:6379/0
          SENTINEL_POSTGRES_URL: postgresql+asyncpg://sentinel:sentinel@localhost/sentinelmcp
          SENTINEL_API_KEY: test-key
          SENTINEL_AUTH_ENABLED: "false"
        run: python -m pytest tests/ -q --tb=short

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dashboard-serve
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-dashboard:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}-dashboard:latest
          build-args: |
            VITE_SENTINEL_API_KEY=placeholder

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/sentinelmcp/

      - name: Template Helm chart (dry-run)
        run: helm template sentinelmcp helm/sentinelmcp/ --debug > /dev/null
