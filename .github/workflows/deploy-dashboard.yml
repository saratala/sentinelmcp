name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
          VITE_SENTINEL_API_KEY: ${{ secrets.SENTINEL_API_KEY || 'dev-key-123' }}
        run: npm run build

      - name: Copy build output to docs/dashboard
        run: |
          rm -rf docs/dashboard
          cp -r dashboard/dist docs/dashboard

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard
          git diff --cached --quiet || git commit -m "chore: rebuild dashboard [skip ci]"
          git push
